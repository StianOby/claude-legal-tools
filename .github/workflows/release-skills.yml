name: Release Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build tag
        id: tag
        run: |
          COMMIT_NUM=$(git rev-list --count HEAD)
          echo "value=skills-$(date +'%Y.%m.%d')-${COMMIT_NUM}" >> $GITHUB_OUTPUT

      - name: Package skills
        run: |
          for skill_dir in skills/*/; do
            skill=$(basename "$skill_dir")
            (cd "$skill_dir" && zip -r "../../${skill}.zip" .)
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          files: "*.zip"
